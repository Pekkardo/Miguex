spring.application.name=dashboard-0800
server.port=8080

# ── Base de datos (MySQL) ────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dashboard?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dashboard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dashboard}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── BBDD aparte del cruce de matrículas x ventas (ruta /cruce del tablero) ────
# Base MySQL propia y separada ("cruce") en el mismo servidor: aislada del tablero
# (no comparte tablas ni datos con "dashboard"). Ver CruceDbConfig.
# createDatabaseIfNotExist=true + credenciales con permiso de creación (root) => el schema
# se crea solo la primera vez, sin pasos manuales.
cruce.datasource.url=${CRUCE_DATASOURCE_URL:jdbc:mysql://localhost:3306/cruce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&createDatabaseIfNotExist=true}
cruce.datasource.username=${CRUCE_DATASOURCE_USERNAME:root}
cruce.datasource.password=${CRUCE_DATASOURCE_PASSWORD:rootpass}
cruce.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
cruce.jpa.hibernate.ddl-auto=update
cruce.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Autenticación (JWT en cookie httpOnly) ───────────────────────────
# JWT_SECRET: mínimo 32 bytes. La app NO arranca si falta (ver JwtService).
# Generar con: openssl rand -base64 48
jwt.secret=${JWT_SECRET:}
jwt.ttl-hours=${JWT_TTL_HOURS:12}
# Poner en true sólo cuando el tablero se sirva por HTTPS: con secure=true sobre
# HTTP el browser descarta la cookie y el login deja de funcionar sin error claro.
jwt.cookie-secure=${JWT_COOKIE_SECURE:false}

# Usuario admin inicial (se crea al arrancar si no existe; ver AdminSeeder).
admin.username=${ADMIN_USER:admin}
admin.password=${ADMIN_PASSWORD:}

# ── Carga de archivos ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ── Actuator ─────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
