spring.application.name=dashboard-0800
server.port=8080

# ── Base de datos (MySQL) ────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dashboard?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dashboard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dashboard}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Carga de archivos ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ── Anthropic (chat IA) ──────────────────────────────────────────────
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-6}

# ── Actuator ─────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
