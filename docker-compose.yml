services:
  # ── Base de datos ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: miguex-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dashboard}
      MYSQL_USER: ${MYSQL_USER:-dashboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dashboard}
    ports:
      - "${MYSQL_PORT:-3308}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - miguex

  # ── Backend Spring Boot ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miguex-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-dashboard}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-dashboard}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-dashboard}
      # BBDD aparte del cruce de matriculas x ventas: base MySQL propia "cruce" en el mismo
      # servidor, aislada de "dashboard". Se crea sola (createDatabaseIfNotExist + root).
      CRUCE_DATASOURCE_URL: jdbc:mysql://mysql:3306/cruce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      CRUCE_DATASOURCE_USERNAME: root
      CRUCE_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      # Autenticación. Ambas son obligatorias: sin JWT_SECRET la app no arranca y
      # sin ADMIN_PASSWORD no se crea el admin (no hay defaults inseguros).
      JWT_SECRET: ${JWT_SECRET:?definir JWT_SECRET en .env (openssl rand -base64 48)}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-12}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?definir ADMIN_PASSWORD en .env}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - miguex

  # ── nginx (frontend + reverse proxy) ───────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: miguex-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8686}:86"
    depends_on:
      backend:
        condition: service_started
    networks:
      - miguex

volumes:
  mysql_data:

networks:
  miguex:
    driver: bridge
